<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Kaarigai Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM — Kaarigai Designs v2
   Aesthetic: Luxury Indian Atelier — 
   deep indigo ink + antique gold + cream vellum
   ══════════════════════════════════════════ */
:root {
  --ink:       #0f1923;
  --ink2:      #1d2d3e;
  --ink3:      #2d4156;
  --gold:      #c9a96e;
  --gold2:     #e8c98a;
  --gold-dim:  #7a5c30;
  --cream:     #faf6f0;
  --cream2:    #f3ede3;
  --cream3:    #e8dfd0;
  --muted:     #8a9ab0;
  --muted2:    #b0bfcf;
  --green:     #2a6048;
  --green-bg:  #edf7f2;
  --green-bd:  #5aaa84;
  --red:       #7a2020;
  --red-bg:    #fdf0f0;
  --red-bd:    #c46060;
  --blue:      #1a3a6a;
  --blue-bg:   #eef4ff;
  --blue-bd:   #6a9ae8;
  --shadow-sm: 0 1px 4px rgba(15,25,35,.07);
  --shadow-md: 0 4px 20px rgba(15,25,35,.10);
  --shadow-lg: 0 12px 48px rgba(15,25,35,.16);
  --r:  8px;
  --r2: 12px;
  --r3: 20px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── TYPOGRAPHY ── */
.serif { font-family: 'Cormorant Garamond', serif; }
.mono  { font-family: 'DM Mono', monospace; }
h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; line-height: 1.2; }

/* ── FORM ELEMENTS ── */
input, select, textarea {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--cream3);
  border-radius: var(--r);
  background: #fff;
  color: var(--ink);
  outline: none;
  transition: border-color .18s, box-shadow .18s;
  appearance: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,169,110,.12);
}
input::placeholder { color: var(--muted2); }
textarea { resize: vertical; min-height: 72px; }
label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .1em;
}

/* ── GRID ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }

/* ── SYNC BAR ── */
#sync-bar {
  background: var(--ink);
  padding: 7px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  font-size: 11px;
  min-height: 32px;
  border-bottom: 1px solid rgba(201,169,110,.15);
}
.sdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background .4s;
}
.sdot.ok      { background: #4ade80; }
.sdot.loading { background: var(--gold2); animation: pulse 1.2s infinite; }
.sdot.err     { background: #f87171; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
#sync-bar button {
  background: transparent;
  border: 1px solid rgba(201,169,110,.3);
  color: var(--gold);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  margin-left: 6px;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
}
#sync-bar button:hover { background: rgba(201,169,110,.12); }

/* ── NAVIGATION ── */
.top-nav {
  background: var(--ink);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 24px rgba(15,25,35,.3);
}
.nav-inner {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  height: 60px;
  gap: 2px;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-right: auto;
  text-decoration: none;
}
.nav-logo-img {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--gold);
  flex-shrink: 0;
}
.nav-logo-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  letter-spacing: .02em;
}
.nav-logo-sub {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-top: -2px;
}
.nav-btn {
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted2);
  font-size: 12px;
  font-weight: 600;
  padding: 0 16px;
  height: 60px;
  cursor: pointer;
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
  position: relative;
  white-space: nowrap;
  letter-spacing: .02em;
}
.nav-btn:hover { color: #fff; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.nbadge {
  background: #ef4444;
  color: #fff;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 9px;
  margin-left: 4px;
  font-weight: 700;
  vertical-align: middle;
  display: none;
}

/* ── PAGES ── */
.page { display: none; max-width: 1120px; margin: 0 auto; padding: 28px 20px 80px; }
.page.on { display: block; animation: fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ── PAGE HEADER ── */
.page-hd {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-hd h2 { font-size: 28px; font-weight: 600; color: var(--ink); }
.page-hd p  { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ── CARDS ── */
.card {
  background: #fff;
  border: 1px solid var(--cream3);
  border-radius: var(--r2);
  padding: 22px;
  box-shadow: var(--shadow-sm);
}

/* ── SECTION TITLE ── */
.stitle {
  font-size: 10px;
  font-weight: 600;
  color: var(--gold-dim);
  text-transform: uppercase;
  letter-spacing: .14em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stitle::after { content:''; flex:1; height:1px; background:var(--cream3); }

/* ── STAT CARDS ── */
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: #fff;
  border: 1px solid var(--cream3);
  border-radius: var(--r2);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card.s-rev::before  { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
.stat-card.s-paid::before { background: linear-gradient(90deg, var(--green), #4aaa80); }
.stat-card.s-bal::before  { background: linear-gradient(90deg, var(--red), #c04040); }
.stat-card.s-act::before  { background: linear-gradient(90deg, var(--blue), #4a7ae8); }
.stat-lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 8px;
}
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
}
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── CHART ── */
.chart-wrap {
  background: #fff;
  border: 1px solid var(--cream3);
  border-radius: var(--r2);
  padding: 20px 22px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.chart-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}
.chart-title { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: .02em; }
.chart-pills { display: flex; gap: 6px; }
.pill {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 20px;
  border: 1.5px solid var(--cream3);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}
.pill:hover, .pill.on {
  background: var(--ink);
  color: var(--gold);
  border-color: var(--ink);
}
.bar-scroll { overflow-x: auto; padding-bottom: 24px; }
.bar-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  height: 130px;
  border-bottom: 1.5px solid var(--cream3);
  min-width: min-content;
}
.bar-grp { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; min-width: 48px; }
.bar-pair { display: flex; align-items: flex-end; gap: 3px; }
.bar-rev {
  background: linear-gradient(180deg, var(--gold) 0%, var(--gold2) 100%);
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  width: 18px;
  position: relative;
}
.bar-bal {
  background: linear-gradient(180deg, var(--red) 0%, #c04040 100%);
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  width: 12px;
}
.bar-tip {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 7px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.bar-lbl { font-size: 9px; color: var(--muted); margin-top: 6px; text-align: center; white-space: nowrap; }
.bar-cnt { color: var(--gold-dim); font-weight: 600; font-size: 9px; }
.chart-legend {
  display: flex;
  gap: 16px;
  margin-top: 10px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
}
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

/* ── REVENUE TABLE ── */
.rev-table-wrap {
  background: #fff;
  border: 1px solid var(--cream3);
  border-radius: var(--r2);
  padding: 0;
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.rtbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.rtbl thead th {
  background: var(--ink);
  color: var(--gold);
  padding: 10px 16px;
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
}
.rtbl tbody td { padding: 10px 16px; border-bottom: 1px solid var(--cream2); }
.rtbl tbody tr:last-child td { border-bottom: none; }
.rtbl tbody tr:hover td { background: var(--cream); }

/* ── ORDER CARDS ── */
.orders-section-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.ocard {
  background: #fff;
  border: 1px solid var(--cream3);
  border-radius: var(--r2);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow .18s, transform .12s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.ocard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: var(--r2) 0 0 var(--r2);
}
.ocard.has-bal::before { background: var(--red); }
.ocard.no-bal::before  { background: var(--green); }
.ocard:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
  border-color: var(--cream3);
}
.ocard:active { transform: scale(.995); }
.oc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.oc-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.oc-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.oc-contact { font-size: 12px; color: var(--muted); }
.oc-amount { text-align: right; }
.oc-total { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 700; color: var(--ink); }
.oc-bal { font-size: 11px; color: var(--red); margin-top: 1px; }
.oc-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--muted);
  padding-top: 8px;
  border-top: 1px solid var(--cream2);
}
.oc-meta b { color: var(--ink2); font-weight: 600; }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: .03em;
}
.badge-ref {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--gold-dim);
  background: rgba(201,169,110,.1);
  padding: 2px 8px;
  border-radius: 4px;
}
.bs-Confirmed, .bs-default { background: #fff8e6; color: #7a5c18; border: 1px solid #e8c96a; }
.bs-In-Progress { background: #fff4e0; color: #8a5a00; border: 1px solid #e8a03a; }
.bs-Ready { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-bd); }
.bs-Delivered { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.bs-Cancelled { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
.b-due { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-bd); }
.b-paid { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.b-tom { background: var(--red); color: #fff; border: none; }
.b-dress { background: rgba(201,169,110,.1); color: var(--gold-dim); border: 1px solid rgba(201,169,110,.3); }

/* ── TOMORROW SECTION ── */
.tom-section {
  background: linear-gradient(135deg, var(--ink) 0%, #1d3050 100%);
  border: 1px solid rgba(201,169,110,.2);
  border-radius: var(--r2);
  padding: 16px 18px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.tom-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
}
.tom-none {
  background: var(--green-bg);
  border: 1px solid var(--green-bd);
  border-radius: var(--r2);
  padding: 12px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--green);
  font-weight: 600;
}
.tom-card {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r);
  padding: 10px 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: background .15s;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.tom-card:hover { background: rgba(255,255,255,.13); }
.tom-card:last-child { margin-bottom: 0; }

/* ── WARN BANNER ── */
.warn-banner {
  background: #fffbeb;
  border: 1.5px solid #f59e0b;
  border-radius: var(--r);
  padding: 12px 16px;
  margin-bottom: 18px;
}

/* ── FILTER BAR ── */
.filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.fbtn {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 20px;
  border: 1.5px solid var(--cream3);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.fbtn:hover, .fbtn.on {
  background: var(--ink);
  color: var(--gold);
  border-color: var(--ink);
}

/* ── MODAL ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,18,28,.72);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
  padding: 14px;
  overflow-y: auto;
  backdrop-filter: blur(2px);
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.mbox {
  background: #fff;
  border-radius: var(--r2);
  width: 100%;
  max-width: 640px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(10,18,28,.4);
  animation: slideUp .22s ease;
}
@keyframes slideUp { from{transform:translateY(14px);opacity:0} to{transform:none;opacity:1} }
.mhead {
  background: linear-gradient(135deg, var(--ink) 0%, var(--ink3) 100%);
  border-radius: var(--r2) var(--r2) 0 0;
  padding: 18px 22px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  position: sticky;
  top: 0;
  z-index: 1;
  border-bottom: 1px solid rgba(201,169,110,.2);
}
.mhead-ref { font-size: 10px; color: var(--gold); font-weight: 600; letter-spacing: .14em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.mhead-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #fff; margin-top: 2px; font-weight: 600; }
.mclose {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.mclose:hover { background: rgba(255,255,255,.22); }
.mbody { padding: 22px; }
.msec { margin-bottom: 22px; }
.frow { display: flex; gap: 7px; align-items: center; }
.frow input, .frow select, .frow textarea { flex: 1; min-width: 0; }

/* ── SAVE BUTTONS ── */
.sbtn {
  padding: 8px 13px;
  font-size: 11px;
  font-weight: 600;
  background: var(--ink);
  color: var(--gold);
  border: 1.5px solid rgba(201,169,110,.3);
  border-radius: var(--r);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
}
.sbtn:hover { opacity: .85; }
.sbtn-green {
  padding: 8px 13px;
  font-size: 11px;
  font-weight: 600;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
}
.sbtn-green:hover { opacity: .88; }

/* ── PAYMENT DISPLAY ── */
.pay-row {
  background: var(--ink);
  border-radius: var(--r);
  padding: 14px 18px;
  display: flex;
  justify-content: space-around;
  margin-bottom: 12px;
}
.pay-lbl { font-size: 10px; color: var(--muted2); margin-bottom: 4px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
.pay-val { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; }
.bal-strip {
  background: #fffbeb;
  border: 1px solid #f59e0b;
  border-radius: var(--r);
  padding: 9px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

/* ── BUTTONS ── */
.btn-primary {
  background: linear-gradient(135deg, var(--ink) 0%, var(--ink3) 100%);
  color: var(--gold);
  border: 1.5px solid rgba(201,169,110,.35);
  padding: 12px 24px;
  border-radius: var(--r);
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  font-size: 14px;
  letter-spacing: .02em;
}
.btn-primary:hover { opacity: .9; }
.btn-primary:active { transform: scale(.98); }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--cream3);
  color: var(--ink);
  padding: 8px 18px;
  border-radius: var(--r);
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background .15s;
  font-size: 13px;
}
.btn-outline:hover { background: var(--cream); }
.btn-danger {
  background: var(--red-bg);
  color: var(--red);
  border: 1.5px solid var(--red-bd);
  padding: 10px 20px;
  border-radius: var(--r);
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background .15s;
  font-size: 13px;
}
.btn-danger:hover { background: #fde0e0; }
.btn-wa {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #25D366;
  color: #fff;
  font-weight: 700;
  padding: 12px 18px;
  border-radius: var(--r);
  text-decoration: none;
  font-size: 13px;
  width: 100%;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
}
.btn-wa:hover { opacity: .9; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: 10px 22px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  pointer-events: none;
  border-left: none;
  box-shadow: 0 8px 32px rgba(15,25,35,.3);
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
  opacity: 0;
  transition: opacity .22s;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── DIVIDER ── */
hr.d { border: none; border-top: 1px solid var(--cream2); margin: 18px 0; }

/* ── FORM CARD (new order) ── */
.form-card {
  background: #fff;
  border: 1px solid var(--cream3);
  border-radius: var(--r2);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  max-width: 720px;
  margin: 0 auto;
}
.form-section {
  padding: 22px 24px;
  border-bottom: 1px solid var(--cream2);
}
.form-section:last-of-type { border-bottom: none; }
.ferr { font-size: 11px; color: var(--red); min-height: 14px; margin-top: 4px; }

/* ── REF PREVIEW ── */
.ref-preview {
  background: var(--cream);
  border: 1px solid var(--cream3);
  border-radius: var(--r);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}

/* ── BALANCE PREVIEW (new order) ── */
.bal-preview {
  background: var(--ink);
  border-radius: var(--r);
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}
.bal-preview-lbl { font-size: 11px; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: .1em; }
.bal-preview-val { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: #fff; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input { padding-left: 38px; background: #fff; }
.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted2);
  font-size: 14px;
  pointer-events: none;
}

/* ── YEAR/MONTH FILTER ── */
.year-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.year-row select {
  width: auto;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 20px;
  background: #fff;
  font-weight: 600;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
  background: #fff;
  border-radius: var(--r2);
  border: 1.5px dashed var(--cream3);
  font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ── SUCCESS MODAL ── */
.success-icon { font-size: 48px; margin-bottom: 12px; }

/* ── RESPONSIVE ── */
@media(max-width:680px) {
  .g2,.g3,.g4 { grid-template-columns: 1fr 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .nav-btn { padding: 0 10px; font-size: 11px; }
  .page { padding: 18px 14px 70px; }
}
@media(max-width:400px) {
  .g2,.g3,.g4 { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<script>
// ─── CONSTANTS ───
const API      = "https://script.google.com/macros/s/AKfycbzPPObxA_Gt1HOM_Fw9CAbSVpkxMC3j0jPntkbc8zPUdiXDnl-dCUhPZbB92RXkpq-B/exec";
const OWNER_WA = "918056388361";
const BOUTIQUE = "Kaarigai Designs";
const IG_HDL   = "@kaarigai_pennea_";
const IG_URL   = "https://www.instagram.com/kaarigai_pennea_";
const MONTHS   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const STATUSES = ["Confirmed","In Progress","Ready","Delivered","Cancelled"];
const DRESS_TYPES = ["Saree","Gown","Blouse","Lehenga","Salwar Kameez","Kurti","Anarkali","Churidar","Pavadai","Other"];

// ─── STATE ───
let orders    = [];
let chartRng  = "6M";
let hSearch   = "", hFilter = "All", hYear = "All", hMonth = "All";

// ─── DATE UTILS ───
// Handles every format Google Sheets can return:
// ISO string, Date object, Excel serial number, US format, JS Date.toString()
function parseDate(v) {
  if (v === null || v === undefined || v === "" || v === 0 || v === false) return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  const s = String(v).trim();
  if (!s || s === "0" || s === "null" || s === "undefined") return null;
  // YYYY-MM-DD  (most common from GAS doGet)
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s.slice(0,10) + "T00:00:00");
    return isNaN(d) ? null : d;
  }
  // MM/DD/YYYY
  const us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (us) { const d = new Date(+us[3], +us[1]-1, +us[2]); return isNaN(d) ? null : d; }
  // Excel serial (Google sometimes sends raw numbers)
  const n = Number(s);
  if (!isNaN(n) && n > 40000 && n < 70000) {
    const d = new Date(Date.UTC(1899,11,30) + n * 86400000);
    return isNaN(d) ? null : d;
  }
  // JS Date.toString() / RFC 2822 / anything else
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function toISO(v) {
  const d = parseDate(v); if (!d) return "";
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}

function fmt(v) {
  const d = parseDate(v); if (!d) return "—";
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}

function todayISO()    { return toISO(new Date()); }
function tomorrowISO() { const t = new Date(); t.setDate(t.getDate()+1); return toISO(t); }

// ─── HELPERS ───
function bal(o)  { return Math.max(0, (+o.totalAmount||0) - (+o.amountPaid||0)); }
function inr(n)  { return "₹" + Number(n||0).toLocaleString("en-IN"); }
function esc(s)  { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
// Stable string ID derived from order id (avoids float/scientific notation issues)
function mkSid(o) { return "o_" + String(o.id).replace(/\D/g,"").replace(/^(\d+)$/,m=>String(Math.round(+m))); }
function findBySid(sid) { return orders.find(o => mkSid(o) === sid); }

let _toastTimer;
function toast(msg, ms=2800) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = "1";
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.style.opacity="0", ms);
}

// ─── SYNC STATUS ───
function syncSet(state, msg) {
  const dot = document.getElementById("sdot");
  const txt = document.getElementById("sync-txt");
  dot.className = "sdot " + state;
  txt.style.color = state==="ok"?"#2ecc71":state==="err"?"#e74c3c":"#f39c12";
  txt.textContent = msg;
  if (state === "ok") {
    setTimeout(()=>{ txt.style.color="#7a8ba6"; txt.textContent="Connected to Google Sheets"; }, 3000);
  }
}

// ─── NORMALISE ORDER FROM SHEETS ───
// CRITICAL: parse dates from raw value BEFORE any String() conversion
function normalise(raw) {
  const o = {};
  for (const k of Object.keys(raw)) {
    if (k === "orderDate" || k === "deliveryDate") {
      o[k] = toISO(raw[k]);        // handles Date objects, serials, strings
    } else {
      const v = raw[k];
      o[k] = (v === null || v === undefined) ? "" : String(v);
    }
  }
  // Fix IDs stored in scientific notation e.g. "1.77e+12"
  if (o.id) {
    const n = Number(o.id);
    if (!isNaN(n) && n > 1e10) o.id = String(Math.round(n));
  }
  return o;
}

// ─── API CALLS ───
async function apiGet() {
  const r = await fetch(API + "?t=" + Date.now(), {
    method: "GET", redirect: "follow", cache: "no-store"
  });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const j = await r.json();
  if (!j.success) throw new Error(j.error || "API error");
  return j;
}

async function apiPost(payload) {
  const r = await fetch(API, {
    method:  "POST",
    headers: { "Content-Type": "text/plain" },
    body:    JSON.stringify(payload),
    redirect:"follow"
  });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const j = await r.json();
  if (!j.success) throw new Error(j.error || "API error");
  return j;
}

// ─── LOAD ORDERS ───
let _loadInProgress = false;
async function load() {
  if (_loadInProgress) return;
  _loadInProgress = true;
  syncSet("loading", "Syncing with Google Sheets…");
  try {
    const j = await apiGet();
    orders = j.orders
      .map(normalise)
      .filter(o => o.status !== "Deleted" && o.deleted !== "true");
    try { localStorage.setItem("kd_orders", JSON.stringify(orders)); } catch(_){}
    syncSet("ok", "Synced ✓");
  } catch(e) {
    syncSet("err", "Sync failed — " + e.message);
    // Fall back to localStorage if fetch fails
    try { const c = localStorage.getItem("kd_orders"); if(c) orders = JSON.parse(c); } catch(_){}
  } finally {
    _loadInProgress = false;
  }
  renderAll();
}

// ─── NAVIGATION ───
function goPage(p) {
  ["dash","new","history"].forEach(n => {
    document.getElementById("page-"+n).classList.toggle("on", n===p);
    document.getElementById("nb-"+n).classList.toggle("active", n===p);
  });
}

// ─── RENDER ALL ───
function renderAll() {
  renderDash();
  renderHistory();
  const tom = getTomorrow();
  const b   = document.getElementById("tom-badge");
  b.textContent = tom.length;
  b.style.display = tom.length ? "inline" : "none";
}

// ─── TOMORROW ORDERS ───
function getTomorrow() {
  const t = tomorrowISO();
  return orders.filter(o =>
    toISO(o.deliveryDate) === t &&
    o.status !== "Delivered" && o.status !== "Cancelled"
  );
}

// ─── DASHBOARD ───
function renderDash() {
  const vis = orders;
  const totRev  = vis.reduce((a,o) => a+(+o.totalAmount||0), 0);
  const totPaid = vis.reduce((a,o) => a+(+o.amountPaid||0), 0);
  const totBal  = vis.reduce((a,o) => a+bal(o), 0);
  const active  = vis.filter(o => !["Delivered","Cancelled"].includes(o.status)).length;
  const deliv   = vis.filter(o => o.status==="Delivered").length;

  const sub = document.getElementById("dash-sub");
  if (sub) sub.textContent = vis.length + " total orders";

  // Monthly buckets
  const mMap = {};
  vis.forEach(o => {
    const d = parseDate(o.orderDate); if (!d) return;
    const k   = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const lbl = MONTHS[d.getMonth()]+"'"+String(d.getFullYear()).slice(2);
    if (!mMap[k]) mMap[k] = {lbl, rev:0, paid:0, outstanding:0, count:0};
    mMap[k].rev += (+o.totalAmount||0);
    mMap[k].paid+= (+o.amountPaid||0);
    mMap[k].outstanding += bal(o);
    mMap[k].count++;
  });
  const allM  = Object.keys(mMap).sort().map(k => mMap[k]);
  const range = {"3M":3,"6M":6,"12M":12}[chartRng];
  const chartM= range ? allM.slice(-range) : allM;
  const maxV  = Math.max(1, ...chartM.map(m => m.rev));

  // Chart
  const chartHTML = chartM.length === 0
    ? `<div class="empty" style="border:none;background:transparent">No orders yet — add orders to see the chart</div>`
    : `<div class="bar-row">${chartM.map(m => {
        const rh = Math.max(3, Math.round(m.rev/maxV*110));
        const bh = Math.max(2, Math.round(m.outstanding/maxV*110));
        const rl = m.rev>=1000 ? "₹"+Math.round(m.rev/1000)+"k" : "₹"+m.rev;
        return `<div class="bar-grp">
          <div class="bar-pair">
            <div style="position:relative">
              <div class="bar-rev" style="height:${rh}px">
                <span style="position:absolute;top:-13px;font-size:7px;font-weight:700;color:#1a2744;left:50%;transform:translateX(-50%);white-space:nowrap">${esc(rl)}</span>
              </div>
            </div>
            <div class="bar-bal" style="height:${bh}px"></div>
          </div>
          <div class="bar-lbl">${esc(m.lbl)}<br><span style="color:#b8965a">${m.count}</span></div>
        </div>`;
      }).join("")}</div>`;

  // Rev table
  const tblRows = allM.length === 0
    ? `<tr><td colspan="5" class="empty" style="border:none">No data yet</td></tr>`
    : allM.slice().reverse().map(m =>
        `<tr>
          <td style="font-weight:700">${esc(m.lbl)}</td>
          <td>${m.count}</td>
          <td style="color:#2e6b4f;font-weight:700">${inr(m.rev)}</td>
          <td style="color:#1a4a7a;font-weight:700">${inr(m.paid)}</td>
          <td style="color:#8b2e2e;font-weight:700">${inr(m.outstanding)}</td>
        </tr>`
      ).join("");

  // Tomorrow section
  const tom = getTomorrow();
  const tomHTML = tom.length
    ? `<div style="background:linear-gradient(135deg,#7b1818,#a02020);border-radius:10px;padding:14px 17px;margin-bottom:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
          <span style="color:#fff;font-size:13px;font-weight:700">🔔 ${tom.length} Deliver${tom.length>1?"ies":"y"} Tomorrow</span>
          <a href="https://wa.me/${OWNER_WA}?text=${encodeURIComponent(ownerAlert(tom))}" target="_blank"
             style="background:#25D366;color:#fff;font-weight:700;padding:5px 12px;border-radius:6px;text-decoration:none;font-size:12px">📲 WhatsApp Alert</a>
        </div>
        ${tom.map(o => `<div class="ocard" data-sid="${esc(mkSid(o))}"
          style="background:rgba(255,255,255,.13);border:none;margin-bottom:6px;padding:9px 13px">
          <span style="color:#ffd89b;font-size:11px;font-weight:700">${esc(o.ref)}</span>
          <span style="color:#fff;font-weight:700;margin-left:6px">${esc(o.fullName)}</span>
          <span style="color:#ddd;font-size:12px;margin-left:6px">${esc(o.phone)}</span>
          <span class="badge b-tom" style="margin-left:6px">${esc(o.dressType)}</span>
          ${bal(o)>0?`<span class="badge" style="background:rgba(255,80,80,.5);color:#fff;border:none;margin-left:4px">Bal: ${inr(bal(o))}</span>`:""}
        </div>`).join("")}
      </div>`
    : `<div style="background:#f0fff5;border:1px solid #2e6b4f;border-radius:8px;padding:10px 14px;margin-bottom:18px;display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">✅</span>
        <span style="color:#2e6b4f;font-weight:700;font-size:13px">No deliveries due tomorrow</span>
      </div>`;

  // Missing dates warning
  const noDate = orders.filter(o => !o.orderDate || !o.deliveryDate);
  const warnHTML = noDate.length
    ? `<div style="background:#fff8e6;border:1.5px solid #c8960a;border-radius:8px;padding:10px 14px;margin-bottom:18px">
        <b style="color:#8b6914">⚠️ ${noDate.length} order(s) missing dates</b><br>
        <span style="font-size:11px;color:#7a8ba6">Tap each order → set Order &amp; Delivery dates → Save Dates</span>
       </div>`
    : "";

  const recent = vis.slice(0, 5);

  document.getElementById("dash-body").innerHTML =
    tomHTML + warnHTML
    + `<div class="g4" style="margin-bottom:18px">
        <div class="stat-card"><p class="stat-lbl">Total Revenue</p><p class="stat-val">${inr(totRev)}</p></div>
        <div class="stat-card"><p class="stat-lbl">Collected</p><p class="stat-val" style="color:#2e6b4f">${inr(totPaid)}</p></div>
        <div class="stat-card"><p class="stat-lbl">Balance Pending</p><p class="stat-val" style="color:#8b2e2e">${inr(totBal)}</p></div>
        <div class="stat-card"><p class="stat-lbl">Active / Delivered</p><p class="stat-val" style="color:#b8965a">${active} / ${deliv}</p></div>
       </div>`
    + `<div class="card" style="margin-bottom:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
          <span style="font-size:12px;font-weight:700;color:#1a2744;text-transform:uppercase;letter-spacing:.08em">Monthly Revenue</span>
          <div style="display:flex;gap:6px">${["3M","6M","12M","ALL"].map(r=>`<button class="pill${chartRng===r?" on":""}" onclick="setRng('${r}')">${r}</button>`).join("")}</div>
        </div>
        <div style="overflow-x:auto;padding-bottom:28px">${chartHTML}</div>
        <div style="display:flex;gap:14px;margin-top:4px">
          <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#7a8ba6"><span style="width:10px;height:10px;background:#b8965a;border-radius:2px;display:inline-block"></span>Revenue</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#7a8ba6"><span style="width:10px;height:10px;background:#8b2e2e;border-radius:2px;display:inline-block"></span>Balance</span>
        </div>
       </div>`
    + `<div class="card" style="margin-bottom:18px;overflow-x:auto">
        <table class="rtbl">
          <thead><tr><th>Month</th><th>Orders</th><th>Revenue</th><th>Collected</th><th>Balance</th></tr></thead>
          <tbody>${tblRows}</tbody>
        </table>
       </div>`
    + `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
        <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">Recent Orders</span>
        <button class="btn-ghost" style="padding:5px 13px;font-size:12px" onclick="goPage('history')">View All →</button>
       </div>`
    + (recent.length
        ? recent.map(cardHTML).join("")
        : `<div class="empty">No orders yet — <button onclick="goPage('new')" style="color:#b8965a;background:none;border:none;cursor:pointer;font-weight:700;font-size:14px">create first →</button></div>`
      );
}

function setRng(r) { chartRng = r; renderDash(); }

// ─── ORDER CARD ───
function cardHTML(o) {
  const b   = bal(o);
  const sc  = "bs-" + (o.status||"default").replace(/ /g,"-");
  const tom = toISO(o.deliveryDate) === tomorrowISO() && !["Delivered","Cancelled"].includes(o.status);
  return `<div class="ocard" data-sid="${esc(mkSid(o))}" style="border-left:4px solid ${b>0?"#8b2e2e":"#2e6b4f"}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
          <span style="font-size:10px;color:#b8965a;font-weight:700;letter-spacing:.1em">${esc(o.ref)}</span>
          <span style="font-size:15px;font-weight:700;color:#1a2744;font-family:'Playfair Display',serif">${esc(o.fullName)}</span>
          <span class="badge" style="background:#f5f0e8;color:#b8965a;border-color:#b8965a">${esc(o.dressType)}</span>
          <span class="badge ${sc}">${esc(o.status||"Confirmed")}</span>
          ${b>0?`<span class="badge b-due">Balance Due</span>`:`<span class="badge b-paid">Fully Paid</span>`}
          ${tom?`<span class="badge b-tom">🚚 Tomorrow</span>`:""}
        </div>
        <p style="font-size:12px;color:#7a8ba6">${esc(o.phone)}${o.email?" · "+esc(o.email):""}</p>
      </div>
      <div style="text-align:right">

// ─── HISTORY ───
function renderHistory() {
  const el = document.getElementById("hist-body"); if (!el) return;
  const FILTERS = ["All","Due Tomorrow","Confirmed","In Progress","Ready","Delivered","Cancelled","Balance Due"];
  const tom = tomorrowISO();

  // Collect years
  const yrs = [...new Set(orders.map(o=>{const d=parseDate(o.orderDate);return d?d.getFullYear():null}).filter(Boolean))].sort((a,b)=>b-a);
  // Months of selected year
  const mos = hYear==="All" ? [] : [...new Set(orders.filter(o=>{const d=parseDate(o.orderDate);return d&&d.getFullYear()==hYear;}).map(o=>parseDate(o.orderDate).getMonth()))].sort((a,b)=>a-b);

  const filtered = orders.filter(o => {
    if (hSearch) {
      const q = hSearch.toLowerCase();
      if (![o.fullName,o.phone,o.ref,o.dressType].some(v=>(v||"").toLowerCase().includes(q))) return false;
    }
    if (hFilter !== "All") {
      if (hFilter === "Balance Due"   && bal(o)<=0) return false;
      if (hFilter === "Due Tomorrow"  && !(toISO(o.deliveryDate)===tom && !["Delivered","Cancelled"].includes(o.status))) return false;
      if (!["Balance Due","Due Tomorrow"].includes(hFilter) && o.status !== hFilter) return false;
    }
    if (hYear !== "All") { const d=parseDate(o.orderDate); if(!d||d.getFullYear()!=hYear) return false; }
    if (hMonth !== "All") { const d=parseDate(o.orderDate); if(!d||d.getMonth()!=hMonth) return false; }
    return true;
  });

  const sub = document.getElementById("hist-sub");
  if (sub) sub.textContent = filtered.length+" of "+orders.length+" orders";

  el.innerHTML =
    `<input style="margin-bottom:12px" placeholder="🔍  Search by name, phone, ref or dress type…"
       value="${esc(hSearch)}" oninput="hSearch=this.value;renderHistory()"/>`
    + `<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px">
        ${FILTERS.map(f=>`<button class="fbtn${hFilter===f?" on":""}" onclick="hFilter='${esc(f)}';renderHistory()">${esc(f)}</button>`).join("")}
       </div>`
    + `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <select style="width:auto;padding:6px 12px;font-size:12px;border-radius:20px;border:1.5px solid ${hYear!=="All"?"#1a2744":"#c8bfa8"};font-weight:700;background:#fff" onchange="hYear=this.value;hMonth='All';renderHistory()">
          <option value="All">All Years</option>
          ${yrs.map(y=>`<option value="${y}"${hYear==y?" selected":""}>${y}</option>`).join("")}
        </select>
        ${hYear!=="All"?`<select style="width:auto;padding:6px 12px;font-size:12px;border-radius:20px;border:1.5px solid ${hMonth!=="All"?"#1a2744":"#c8bfa8"};font-weight:700;background:#fff" onchange="hMonth=this.value;renderHistory()">
          <option value="All">All Months</option>
          ${mos.map(m=>`<option value="${m}"${hMonth==m?" selected":""}>${MONTHS[m]}</option>`).join("")}
        </select>`:""}
       </div>`
    + (filtered.length
        ? filtered.map(cardHTML).join("")
        : `<div class="empty">No orders match your filter.</div>`
      );
}

// ─── SAVE FIELD ───
async function saveF(sid, field, value) {
  const o = findBySid(sid); if (!o) return;
  // Optimistic update in memory
  orders = orders.map(x => mkSid(x)===sid ? {...x,[field]:value} : x);
  try { localStorage.setItem("kd_orders",JSON.stringify(orders)); } catch(_){}
  renderAll();
  toast("Saving…");
  try {
    await apiPost({ action:"update", id:o.id, fields:{[field]:value} });
    toast("✅ " + field + " saved to Sheets");
  } catch(e) { toast("⚠️ Saved locally — " + e.message); }
}

async function saveDates(sid) {
  const od = document.getElementById("me-od")?.value;
  const dd = document.getElementById("me-dd")?.value;
  if (!od || !dd) { toast("Please set both dates"); return; }
  const o = findBySid(sid); if (!o) return;
  orders = orders.map(x => mkSid(x)===sid ? {...x, orderDate:od, deliveryDate:dd} : x);
  try { localStorage.setItem("kd_orders",JSON.stringify(orders)); } catch(_){}
  closeModal(); renderAll(); toast("Saving dates…");
  try {
    await apiPost({ action:"update", id:o.id, fields:{orderDate:od, deliveryDate:dd} });
    toast("✅ Dates saved to Sheets");
  } catch(e) { toast("⚠️ Saved locally — " + e.message); }
}

async function delOrder(sid) {
  if (!confirm("Delete this order? It will be hidden but kept in Sheets.")) return;
  const o = findBySid(sid); if (!o) return;
  orders = orders.filter(x => mkSid(x) !== sid);
  try { localStorage.setItem("kd_orders",JSON.stringify(orders)); } catch(_){}
  closeModal(); renderAll(); toast("Deleting…");
  try {
    await apiPost({ action:"delete", id:o.id });
    toast("✅ Deleted from Sheets");
  } catch(e) { toast("⚠️ Removed locally"); }
}

function gv(id) { const el=document.getElementById(id); return el?el.value.trim():""; }

async function submitOrder() {
  const req = {
    fullName:    gv("fn"), phone:       gv("ph"),
    dressType:   gv("dt"), totalAmount: gv("tot"),
    amountPaid:  gv("adv"), orderDate:  gv("od"),
    deliveryDate:gv("dd")
  };
  const errs = {fn:"Required",ph:"Required",dt:"Select dress type",tot:"Enter amount",adv:"Enter amount",od:"Required",dd:"Required"};
  let ok = true;
  for (const [k,msg] of Object.entries(errs)) {
    const field = k==="tot"?"totalAmount":k==="adv"?"amountPaid":k==="od"?"orderDate":k==="dd"?"deliveryDate":k==="fn"?"fullName":k==="ph"?"phone":"dressType";
    const bad = !req[field] || (["totalAmount","amountPaid"].includes(field) && isNaN(+req[field]));
    const el = document.getElementById("err-"+k);
    if (el) el.textContent = bad ? msg : "";
    if (bad) ok = false;
  }
  if (!ok) return;

  const phone = req.phone.replace(/\D/g,"");
  const l4    = phone.length>=4 ? phone.slice(-4) : phone.padEnd(4,"0");
  const id    = String(Date.now());
  const o = {
    id, ref:`KD-${new Date().getFullYear()}-${l4}`,
    fullName:req.fullName, phone, email:gv("em"),
    dressType:req.dressType,
    bust:gv("bust"), waist:gv("waist"), hip:gv("hip"),
    length:gv("len"), shoulder:gv("sho"), sleeve:gv("slv"),
    customization:gv("cust"), notes:gv("nts"),
    totalAmount:req.totalAmount, amountPaid:req.amountPaid,
    orderDate:req.orderDate, deliveryDate:req.deliveryDate,
    status:"Confirmed", deleted:"false",
    createdAt:new Date().toISOString()
  };

  orders.unshift(o);
  try { localStorage.setItem("kd_orders",JSON.stringify(orders)); } catch(_){}
  resetForm(); goPage("dash"); renderAll();
  showSuccessModal(o);

  syncSet("loading","Saving order…");
  try {
    await apiPost({ action:"save", order:o });
    syncSet("ok","Order saved to Google Sheets ✓");
  } catch(e) {
    syncSet("err","Save failed — stored locally");
    toast("⚠️ Saved locally — " + e.message, 4000);
  }
}

function resetForm() {

// ─── EXPORT ───
const EXPORT_FIELDS = [
  "id","ref","fullName","phone","email","dressType",
  "bust","waist","hip","length","shoulder","sleeve",
  "customization","notes","totalAmount","amountPaid",
  "orderDate","deliveryDate","status","createdAt"
];

function exportCSV() {
  if (!orders.length) { toast("No orders to export"); return; }
  const header = EXPORT_FIELDS.join(",");
  const rows = orders.map(o =>
    EXPORT_FIELDS.map(f => {
      const v = String(o[f] || "").replace(/"/g, '""');
      return v.includes(",") || v.includes('"') || v.includes("\n") ? `"${v}"` : v;
    }).join(",")
  );
  const csv = [header, ...rows].join("\n");
  dlFile("kaarigai-orders-" + todayISO() + ".csv", csv, "text/csv");
  toast("✅ CSV exported — " + orders.length + " orders");
}

function exportJSON() {
  if (!orders.length) { toast("No orders to export"); return; }
  const data = {
    exported: new Date().toISOString(),
    boutique: BOUTIQUE,
    total: orders.length,
    orders: orders.map(o => {
      const out = {};
      EXPORT_FIELDS.forEach(f => out[f] = o[f] || "");
      out.balance = String(bal(o));
      return out;
    })
  };
  dlFile("kaarigai-orders-" + todayISO() + ".json", JSON.stringify(data, null, 2), "application/json");
  toast("✅ JSON exported — " + orders.length + " orders");
}

function dlFile(filename, content, type) {
  const blob = new Blob([content], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── INIT ───
// ── IMMEDIATE INIT — fires as soon as DOM is parsed ──
(function initApp() {
  // Restore cached data instantly so UI isn't blank
  try {
    const c = localStorage.getItem("kd_orders");
    if (c) { orders = JSON.parse(c); renderAll(); }
  } catch(_){}
})();

// ── ON DOM READY — set form defaults + kick off first fetch ──
document.addEventListener("DOMContentLoaded", () => {
  const od = document.getElementById("od");
  if (od) od.value = todayISO();
  updRef();

  // First fetch — populates the app with live Sheets data
  load();

  // Auto-sync every 30 seconds
  setInterval(load, 30000);

  // Re-sync whenever user switches back to this tab
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) load();
  });
});
</script>
